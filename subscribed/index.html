<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/apple-touch-icon.png">
  <title>Subscription Confirmed - ShortCode Directory</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .card {
      max-width: 540px;
      width: 90%;
      padding: 48px 32px;
      text-align: center;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .badge {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px auto;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(52, 211, 153, 0.1) 100%);
      border: 1px solid rgba(52, 211, 153, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tag {
      color: #10b981;
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 12px 0 16px 0;
    }
    p {
      color: #94a3b8;
      line-height: 1.7;
      font-size: 1rem;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0284c7 0%, #38bdf8 100%);
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(2, 132, 199, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <span class="tag">Subscription Confirmed</span>
    <h1>You're on the list!</h1>
    <p>Thank you for confirming your email address. You will now receive shortcode directory updates, sender additions, and scam security alerts.</p>
    <a href="/" class="btn">Return to ShortCode Directory</a>
  </div>
</body>
</html>
